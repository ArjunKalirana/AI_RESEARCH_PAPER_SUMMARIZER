<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ResearchAI - Shared Document</title>
<link href="dist/output.css" rel="stylesheet"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
<script src="/socket.io/socket.io.js"></script>
<style>
    body { font-family: 'Inter', sans-serif; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
</style>
</head>
<body class="bg-slate-50 font-sans h-screen flex flex-col overflow-hidden">
<div class="w-full bg-blue-600 text-white text-[11px] uppercase tracking-widest font-black py-2.5 text-center flex items-center justify-center gap-2 shadow-md z-50">
    <span class="material-symbols-outlined text-[14px]">link</span>
    Shared Paper (Read-only). <a href="/" class="underline hover:text-blue-200 ml-2">Sign up to upload your own</a>
</div>
<header class="flex h-16 w-full items-center justify-between border-b border-slate-200 bg-white px-8 z-20 shadow-sm relative">
   <div class="flex items-center gap-3">
      <div class="bg-blue-600 p-1.5 rounded-lg font-bold text-white shadow-md shadow-blue-500/20"><span class="material-symbols-outlined block text-sm">science</span></div>
      <h1 class="font-black tracking-tight text-slate-800">ResearchAI Share</h1>
   </div>
   <div id="metaHeader" class="text-xs bg-slate-100 text-slate-600 font-bold px-4 py-1.5 rounded-full border border-slate-200 truncate max-w-[300px]">Authenticating link...</div>
</header>
<main class="relative flex flex-1 flex-col overflow-hidden bg-slate-50/50">
   <div class="flex-1 overflow-y-auto px-4 py-8 custom-scrollbar pb-32" id="chatArea">
       <div id="chatContainer" class="mx-auto max-w-3xl space-y-6"></div>
   </div>
   <div class="w-full bg-white/90 backdrop-blur-md border-t border-slate-200 py-6 px-6 absolute bottom-0 shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
      <div class="mx-auto max-w-3xl flex items-center gap-2 bg-slate-100 rounded-full pl-5 pr-2 py-2 border border-slate-200 focus-within:border-blue-400 focus-within:ring-4 focus-within:ring-blue-100 transition-all shadow-inner">
         <input id="chatInput" type="text" class="w-full bg-transparent border-none focus:ring-0 text-sm font-medium text-slate-700 placeholder:text-slate-400" placeholder="Ask anything about this document..." />
         <button id="sendBtn" class="bg-blue-600 text-white rounded-full h-9 w-9 flex items-center justify-center hover:scale-105 active:scale-95 transition-all shadow-md shadow-blue-600/30"><span class="material-symbols-outlined text-[16px]">send</span></button>
      </div>
   </div>
</main>
<script>
    const token = window.location.pathname.split('/').pop();
    const chatContainer = document.getElementById('chatContainer');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const metaHeader = document.getElementById('metaHeader');
    
    fetch(`/api/share/${token}`)
       .then(r => r.json())
       .then(data => {
           if (data.error) {
               metaHeader.innerHTML = `<span class="text-red-500 font-black">${data.error}</span>`;
               chatInput.disabled = true;
               chatInput.placeholder = "Chat disabled. Link expired.";
               return;
           }
           metaHeader.textContent = `${data.title} (${data.year || 'n.d.'})`;
           appendAssistantMsg(`Hello! The owner of this link shared **${data.title}** with you.\n\nAbstract Preview: _${data.abstractPreview}_ \n\nWhat would you like to ask about this paper?`, 'system-msg');
       })
       .catch(e => {
           metaHeader.textContent = `Invalid disconnected link`;
       });

    const socket = io();
    
    const originalFetch = window.fetch;
    window.fetch = async function() {
      let [resource, config] = arguments;
      if (!config) config = {};
      if (!config.headers) config.headers = {};
      config.headers['x-share-token'] = token;
      return originalFetch(resource, config);
    };

    function appendUserMsg(msg) {
        chatContainer.insertAdjacentHTML('beforeend', `<div class="flex justify-end animate-in"><div class="bg-slate-200 border border-slate-300 text-slate-800 px-5 py-3 rounded-2xl rounded-tr-sm max-w-[80%] text-sm font-medium shadow-sm">${msg}</div></div>`);
        scrollToBottom();
    }

    function appendAssistantMsg(msg, id='') {
        chatContainer.insertAdjacentHTML('beforeend', `<div class="flex justify-start animate-in flex-col gap-2" id="${id}">
           <span class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">AI Assistant</span>
           <div class="msg-body bg-white border border-slate-200 text-slate-700 px-5 py-4 rounded-2xl rounded-tl-sm max-w-[85%] text-sm shadow-md leading-relaxed whitespace-pre-wrap">${renderMd(msg)}</div>
        </div>`);
        scrollToBottom();
    }

    function scrollToBottom() {
        const area = document.getElementById('chatArea');
        area.scrollTop = area.scrollHeight;
    }

    sendBtn.onclick = async () => {
        const q = chatInput.value.trim();
        if (!q) return;
        appendUserMsg(q);
        chatInput.value = '';
        
        const loadingId = 'msg-' + Date.now();
        appendAssistantMsg('Scanning document...', loadingId);

        let fullText = '';
        socket.on('ask:chunk', data => {
            fullText += data.chunk;
            document.getElementById(loadingId).querySelector('.msg-body').innerHTML = renderMd(fullText);
            scrollToBottom();
        });
        socket.on('ask:error', data => {
            document.getElementById(loadingId).querySelector('.msg-body').innerHTML = `<span class="text-red-500 font-bold">${data.error}</span>`;
            socket.off('ask:chunk');
            socket.off('ask:error');
        });
        socket.on('ask:final', () => {
            socket.off('ask:chunk');
            socket.off('ask:error');
            socket.off('ask:final');
        });

        try {
            await fetch('/api/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ socketId: socket.id, question: q })
            });
        } catch(e) {}
    };

    chatInput.onkeypress = e => { if(e.key==='Enter') sendBtn.click(); };

    function renderMd(txt) { 
        return txt
            .replace(/\\*\\*(.*?)\\*\\*/g, '<strong class="font-black text-slate-900">$1</strong>')
            .replace(/_(.*?)_/g, '<em class="text-slate-500">$1</em>');
    }
</script>
</body>
</html>

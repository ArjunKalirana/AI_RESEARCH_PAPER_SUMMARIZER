<script>
    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        let paperId = urlParams.get('paperId');
        let paperIds = [];

        // If paperId is in URL, we are in single-paper mode
        if (paperId) {
            localStorage.removeItem('selectedPapers'); // Clear any multi-selection
        } else {
            // Check for multi-paper selection from localStorage
            const stored = localStorage.getItem('selectedPapers');
            if (stored) {
                paperIds = JSON.parse(stored);
                if (paperIds.length > 1) {
                    document.getElementById('headerPaperTitle').textContent = `Analyzing ${paperIds.length} Papers`;
                    document.getElementById('chatInput').placeholder = "Ask a question across all selected papers...";
                } else if (paperIds.length === 1) {
                    paperId = paperIds[0];
                }
            }
        }

        if (!paperId && paperIds.length === 0) {
            showToast('No paper selected. Redirecting to your library...', 'warning', 3000);
            setTimeout(() => window.location.href = 'library.html', 1500);
            return;
        }

        const CHAT_STORAGE_KEY = `chat_${paperId || paperIds.join('_')}`;

        function persistMessage(role, text, metadata = null) {
          try {
            const stored = JSON.parse(sessionStorage.getItem(CHAT_STORAGE_KEY) || '[]');
            stored.push({ role, text, metadata, ts: Date.now() });
            // Keep last 30 messages to avoid storage bloat
            if (stored.length > 30) stored.splice(0, stored.length - 30);
            sessionStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify(stored));
          } catch (e) { console.error('Failed to persist chat message:', e); }
        }

        const chatContainer = document.getElementById('chatContainer');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const quickSuggestions = document.getElementById('quickSuggestions');

        // Bind quick suggestion buttons
        document.querySelectorAll('#quickSuggestions button').forEach(btn => {
            btn.onclick = () => {
                chatInput.value = btn.innerText;
                handleSend();
            };
        });

        function restoreSession() {
          const stored = JSON.parse(sessionStorage.getItem(CHAT_STORAGE_KEY) || '[]');
          if (stored.length === 0) return;
          
          // Remove the default greeting
          const defaultGreeting = chatContainer.querySelector('.space-y-4');
          if (defaultGreeting) defaultGreeting.remove();
          
          stored.forEach((msg, i) => {
            if (msg.role === 'user') {
              appendUserMessage(msg.text);
            } else {
              const id = 'restored-' + i;
              appendAssistantMessage(renderMarkdown(msg.text), '', id);
              if (msg.metadata) injectMetadata(id, msg.metadata);
            }
          });
          
          scrollToBottom();
          showToast(`Restored ${Math.floor(stored.length / 2)} previous Q&A from this session`, 'info', 2500);
        }

        restoreSession();

        chatInput.onkeypress = (e) => { if (e.key === 'Enter') handleSend(); };
        sendBtn.onclick = handleSend;
        document.getElementById('saveChatBtn')?.addEventListener('click', saveChatAsMarkdown);

        async function handleSend() {
            const question = chatInput.value.trim();
            if (!question) return;

            // Cancel any previous in-flight request
            if (window._currentAskAbort) window._currentAskAbort.abort();
            const abortController = new AbortController();
            window._currentAskAbort = abortController;

            // Clear any existing follow-up chips from previous messages
            document.querySelectorAll('.suggestions-container').forEach(el => el.remove());

            // 1. Append User Message
            appendUserMessage(question);
            persistMessage('user', question);
            chatInput.value = '';
            
            // 2. Append Loading Assistant Message
            const loadingId = 'msg-' + Date.now();
            appendAssistantMessage("Thinking...", null, loadingId);
            
            scrollToBottom();

            let reader = null;
            try {
                console.log('[Chat] Sending question to /api/ask...');
                const response = await fetch('/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        paperId: paperIds.length > 1 ? null : paperId, 
                        paperIds: paperIds.length > 1 ? paperIds : null,
                        question 
                    }),
                    signal: abortController.signal
                });

                console.log('[Chat] Response status:', response.status, response.headers.get('content-type'));

                if (!response.ok) {
                    console.error('[Chat] Server Error Response:', response.status, response.statusText);
                    const errorJson = await response.json().catch(() => ({}));
                    console.error('[Chat] Error details:', errorJson);
                    updateAssistantMessage(loadingId, "I'm sorry, I encountered a server error.");
                    return;
                }

                console.log('[Chat] Stream connection established. Starting reader...');

                reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let isFirstChunk = true;
                let fullText = "";
                let buffer = "";
                let readCount = 0;

                while (true) {
                    const { done, value } = await reader.read().catch(e => {
                        console.error('[Chat] Reader read error:', e.message);
                        throw e;
                    });
                    readCount++;
                    if (done) {
                        console.log(`[Chat] Stream done after ${readCount} reads. Full text length: ${fullText.length}`);
                        break;
                    }

                    const rawChunk = decoder.decode(value, { stream: true });
                    buffer += rawChunk;
                    
                    if (readCount <= 3) {
                        console.log(`[Chat] Read #${readCount}: ${rawChunk.length} bytes, buffer: ${buffer.length} bytes`);
                    }

                    const events = buffer.split('\n\n');
                    buffer = events.pop();

                    for (const event of events) {
                        if (!event.startsWith('data: ')) continue;
                        
                        try {
                            const data = JSON.parse(event.substring(6));
                            if (data.heartbeat || data.status) continue; // keepalive / initial ack

                            if (data.error) {
                                console.log('[Chat] SSE error event:', data.error);
                                updateAssistantMessage(loadingId, data.error);
                                break;
                            }

                            if (data.chunk) {
                                if (isFirstChunk) {
                                    console.log('[Chat] First chunk received! Clearing Thinking...');
                                    updateAssistantMessage(loadingId, ""); // Clear "Thinking..."
                                    isFirstChunk = false;
                                }
                                fullText += data.chunk;
                                updateAssistantMessage(loadingId, renderMarkdown(fullText), false);
                                scrollToBottom();
                            }

                            if (data.final) {
                                console.log('[Chat] Final event received. Score:', data.confidenceScore);
                                injectMetadata(loadingId, data);
                                persistMessage('assistant', fullText, { 
                                  confidenceLabel: data.confidenceLabel, 
                                  confidenceScore: data.confidenceScore, 
                                  sources: data.sources 
                                });
                            }

                            if (data.suggestions) {
                                console.log('[Chat] Suggestions received:', data.suggestions?.length);
                                renderSuggestions(loadingId, data.suggestions);
                                scrollToBottom();
                            }

                        } catch (err) {
                            console.error('[Chat] SSE parse error:', err.message, 'Raw event:', event.substring(0, 200));
                        }
                    }
                }

            } catch (err) {
                if (err.name === 'AbortError') {
                    console.log('[Chat] Request aborted (user sent new message)');
                    return;
                }
                console.error('[Chat] Fetch error:', err.message);
                updateAssistantMessage(loadingId, "Connection lost. Please try again.");
            } finally {
               try { reader?.releaseLock(); } catch (e) {}
            }
        }

        function appendUserMessage(text) {
            const html = `
                <div class="flex flex-col items-end animate-in">
                    <div class="inline-block rounded-2xl bg-slate-100 px-5 py-3 text-slate-800 dark:bg-slate-800 dark:text-slate-200 text-sm font-medium max-w-[85%] border border-slate-200 dark:border-slate-700">
                        ${text}
                    </div>
                </div>
            `;
            chatContainer.insertAdjacentHTML('beforeend', html);
        }

        function appendAssistantMessage(text, badgeHtml = '', id = '') {
            const html = `
                <div class="space-y-4 animate-in" id="${id}">
                    <div class="flex items-center gap-3">
                        <span class="text-[10px] font-black uppercase tracking-widest text-slate-400">Assistant</span>
                        <div class="badge-target flex items-center gap-2"></div>
                    </div>
                    <div class="text-base leading-relaxed text-slate-700 dark:text-slate-300 transition-all message-body">
                        ${text}
                    </div>
                </div>
            `;
            chatContainer.insertAdjacentHTML('beforeend', html);
        }

        function updateAssistantMessage(id, html, final = true) {
            const el = document.getElementById(id);
            if (!el) return;
            const body = el.querySelector('.message-body');
            if (body) body.innerHTML = html;
        }

        function injectMetadata(id, data) {
            const el = document.getElementById(id);
            if (!el) return;
            
            const badgeTarget = el.querySelector('.badge-target');
            if (badgeTarget && data.confidenceLabel) {
                const score = data.confidenceScore || 0;
                const pct = Math.round(score * 100);
                let pillStyle, icon, label;

                if (data.confidenceLabel === 'High') {
                    pillStyle = 'background:#dcfce7;color:#15803d;border:1px solid #bbf7d0;';
                    icon = '✓'; label = 'High Confidence';
                } else if (data.confidenceLabel === 'Medium') {
                    pillStyle = 'background:#fef9c3;color:#a16207;border:1px solid #fef08a;';
                    icon = '~'; label = 'Medium Confidence';
                } else {
                    pillStyle = 'background:#fee2e2;color:#b91c1c;border:1px solid #fecaca;';
                    icon = '⚠'; label = 'Low Confidence';
                }

                const tooltipText = `This score reflects how well the answer is grounded in the paper's content. High = answer directly supported by paper text. Score: ${pct}%.`;

                badgeTarget.innerHTML = `
                    <div class="conf-pill-wrapper" style="position:relative;display:inline-block;">
                        <button class="conf-pill" 
                            style="font-size:11px;border-radius:12px;padding:3px 10px;cursor:pointer;font-weight:700;letter-spacing:0.04em;
                                   transition:all 0.2s;display:flex;align-items:center;gap:4px;${pillStyle}"
                            onclick="this.closest('.conf-pill-wrapper').querySelector('.conf-tooltip').classList.toggle('visible')"
                            title="Click for details">
                            <span>${icon}</span><span>${label}</span>
                        </button>
                        <div class="conf-tooltip"
                            style="position:absolute;top:calc(100% + 6px);left:0;min-width:220px;max-width:280px;
                                   background:#1e293b;color:#e2e8f0;font-size:11px;line-height:1.5;padding:8px 12px;
                                   border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,0.2);z-index:50;
                                   opacity:0;transform:translateY(-4px);transition:all 0.2s;pointer-events:none;">
                            ${tooltipText}
                        </div>
                    </div>
                `;
                // Inject CSS for .visible state once
                if (!document.getElementById('conf-tooltip-style')) {
                    const s = document.createElement('style');
                    s.id = 'conf-tooltip-style';
                    s.textContent = `.conf-tooltip.visible{opacity:1!important;transform:translateY(0)!important;pointer-events:auto!important;}`;
                    document.head.appendChild(s);
                }
                // Close tooltip when clicking outside
                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.conf-pill-wrapper')) {
                        document.querySelectorAll('.conf-tooltip').forEach(t => t.classList.remove('visible'));
                    }
                }, { once: false });
            }

            const body = el.querySelector('.message-body');
            
            if (data.sources && data.sources.length > 0) {
                const tags = data.sources.map(s =>
                    `<span style="display:inline-flex;align-items:center;gap:4px;background:#f1f5f9;color:#64748b;
                        font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;border:1px solid #e2e8f0;">
                        📍 ${s}
                    </span>`
                ).join('');
                const sourceHtml = `
                    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:14px;padding-top:12px;border-top:1px solid #f1f5f9;">
                        ${tags}
                    </div>
                `;
                body.insertAdjacentHTML('beforeend', sourceHtml);
            }
            
            // Add placeholder for pending suggestions
            const placeholderHtml = `
                <div class="suggestions-placeholder flex items-center gap-2 mt-4 animate-pulse">
                    <div class="h-8 w-48 bg-slate-100 dark:bg-slate-800/50 rounded-full border border-slate-200 dark:border-slate-800 text-[10px] flex items-center justify-center text-slate-400 font-bold uppercase tracking-widest gap-2">
                        <span class="material-symbols-outlined text-sm animate-spin">progress_activity</span>
                        Generating Suggestions...
                    </div>
                </div>
            `;
            body.insertAdjacentHTML('beforeend', placeholderHtml);
        }

        function renderSuggestions(id, suggestions) {
            const el = document.getElementById(id);
            if (!el) return;
            
            const body = el.querySelector('.message-body');

            // Remove placeholder if it exists
            const placeholder = body.querySelector('.suggestions-placeholder');
            if (placeholder) placeholder.remove();

            // Prevent duplicate suggestion boxes
            if (body.querySelector('.suggestions-container')) return;

            const container = document.createElement('div');
            container.className = 'suggestions-container flex flex-wrap gap-2 mt-4 animate-in';
            suggestions.forEach(q => {
                const btn = document.createElement('button');
                // Requested styling: border: 1px solid #4f8ef7, border-radius: 20px, padding: 6px 14px, cursor: pointer, hover background: rgba(79,142,247,0.1)
                btn.className = 'suggestion-chip px-[14px] py-[6px] text-[13px] font-medium text-[#4f8ef7] border border-[#4f8ef7] rounded-[20px] hover:bg-[rgba(79,142,247,0.1)] transition-all active:scale-95 cursor-pointer shadow-sm text-left';
                btn.innerText = q;
                btn.onclick = () => {
                    chatInput.value = btn.innerText;
                    handleSend();
                };
                container.appendChild(btn);
            });
            body.appendChild(container);
        }

        function scrollToBottom() {
            const container = document.querySelector('.custom-scrollbar');
            container.scrollTop = container.scrollHeight;
        }

        function renderMarkdown(text) {
          if (!text) return '';
          
          return text
            // Escape HTML first
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            
            // Headers
            .replace(/^### (.+)$/gm, '<h3 style="font-size:15px;font-weight:700;margin:16px 0 6px;color:#0f172a;">$1</h3>')
            .replace(/^## (.+)$/gm, '<h2 style="font-size:17px;font-weight:800;margin:20px 0 8px;color:#0f172a;">$1</h2>')
            .replace(/^# (.+)$/gm, '<h1 style="font-size:19px;font-weight:900;margin:20px 0 8px;color:#0f172a;">$1</h1>')
            
            // Bold and italic
            .replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>')
            .replace(/\*\*([^*]+)\*\*/g, '<strong style="font-weight:700;color:#0f172a;">$1</strong>')
            .replace(/\*([^*]+)\*/g, '<em style="font-style:italic;">$1</em>')
            
            // Inline code
            .replace(/`([^`]+)`/g, '<code style="background:#f1f5f9;color:#7c3aed;font-family:monospace;font-size:12px;padding:2px 6px;border-radius:4px;border:1px solid #e2e8f0;">$1</code>')
            
            // Numbered lists
            .replace(/^\d+\. (.+)$/gm, '<li style="margin:4px 0 4px 20px;list-style:decimal;">$1</li>')
            
            // Bullet lists
            .replace(/^[-•*] (.+)$/gm, '<li style="margin:4px 0 4px 20px;list-style:disc;">$1</li>')
            
            // Wrap consecutive <li> items in a <ul> or <ol>
            .replace(/(<li[^>]*>.*<\/li>\n?)+/g, '<ul style="margin:8px 0;padding-left:4px;">$&</ul>')
            
            // Block quotes
            .replace(/^> (.+)$/gm, '<blockquote style="border-left:3px solid #1e68f1;padding:4px 12px;margin:8px 0;color:#64748b;font-style:italic;">$1</blockquote>')
            
            // Horizontal rules
            .replace(/^---$/gm, '<hr style="border:none;border-top:1px solid #f1f5f9;margin:16px 0;">')
            
            // Paragraphs (double newline)
            .replace(/\n\n/g, '</p><p style="margin:8px 0;">')
            .replace(/\n/g, '<br>');
        }

        function saveChatAsMarkdown() {
          const paperTitle = document.getElementById('headerPaperTitle')?.textContent || 'Research Paper';
          const timestamp = new Date().toLocaleString('en-US', { 
            year: 'numeric', month: 'long', day: 'numeric', 
            hour: '2-digit', minute: '2-digit' 
          });
          
          let md = `# Research Chat Export\n`;
          md += `**Paper:** ${paperTitle}\n`;
          md += `**Exported:** ${timestamp}\n\n`;
          md += `---\n\n`;

          // Scrape all messages from the DOM
          const chatContainer = document.getElementById('chatContainer');
          const messageBlocks = chatContainer.querySelectorAll('.space-y-4, .flex.flex-col.items-end');
          
          messageBlocks.forEach(block => {
            const isUser = block.classList.contains('items-end');
            if (isUser) {
              const text = block.querySelector('div > div')?.innerText || '';
              if (text) md += `**You:** ${text}\n\n`;
            } else {
              const body = block.querySelector('.message-body');
              if (body) {
                // Get text content, preserve structure
                const text = body.innerText
                  .replace(/📍.*$/gm, '') // Remove source tags line
                  .replace(/✓.*?Confidence|~.*?Confidence|⚠.*?Confidence/g, '') // Remove confidence pills
                  .trim();
                const confPill = block.querySelector('.conf-pill');
                const confLabel = confPill ? ` _(${confPill.innerText.trim()})_` : '';
                if (text) md += `**Assistant:**${confLabel}\n\n${text}\n\n`;
                
                // Add sources if present
                const sourceTags = block.querySelectorAll('[style*="background:#f1f5f9"]');
                if (sourceTags.length > 0) {
                  const sources = Array.from(sourceTags).map(t => t.innerText.replace('📍', '').trim());
                  md += `> 📍 Sources: ${sources.join(', ')}\n\n`;
                }
                
                md += `---\n\n`;
              }
            }
          });

          // Download as .md file
          const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `chat-${paperTitle.replace(/[^a-z0-9]/gi, '-').toLowerCase().slice(0, 40)}-${Date.now()}.md`;
          a.click();
          URL.revokeObjectURL(url);
          
          showToast('Chat saved as Markdown file!', 'success');
        }

        // ── Upgrade #9: Keyboard Shortcuts ──────────────────────────────────
        document.addEventListener('keydown', (e) => {
            const input = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendBtn');

            // ⌘/Ctrl + S → Save chat
            if ((e.metaKey || e.ctrlKey) && e.key === 's') {
                e.preventDefault();
                saveChatAsMarkdown();
            }

            // ⌘/Ctrl + Enter → send (works even when input isn't focused)
            if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
                e.preventDefault();
                sendBtn?.click();
            }

            // ⌘/Ctrl + K → focus input
            if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                e.preventDefault();
                input?.focus();
                input?.select();
            }

            // Escape → clear input if focused
            if (e.key === 'Escape' && input && document.activeElement === input) {
                input.value = '';
            }
        });
    });
</script>
</body></html>

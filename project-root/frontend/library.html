<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResearchAI - Paper Library</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-dark: #0d1117;
            --bg-sidebar: #101622;
            --card-bg: #161b22;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent: #4f8ef7;
            --accent-hover: #3b7ad9;
            --border: #30363d;
            --danger: #da3633;
            --success: #238636;
            --star-color: #e3b341;
            --tag-bg: rgba(79, 142, 247, 0.1);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .logo { font-size: 1.5rem; font-weight: 800; color: #fff; display: flex; align-items: center; gap: 0.75rem; text-decoration: none; }
        .logo span { color: var(--accent); }
        nav { display: flex; gap: 1.5rem; }
        nav a { color: var(--text-dim); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
        nav a:hover { color: var(--accent); }

        .layout-body {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 1.5rem 1rem;
            flex-shrink: 0;
        }

        .nav-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px; border-radius: 8px;
            color: var(--text-dim); text-decoration: none;
            font-weight: 500; font-size: 0.95rem; cursor: pointer;
            transition: all 0.2s; margin-bottom: 4px;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .nav-item.active { background: var(--accent); color: #fff; }
        
        .sidebar-divider { height: 1px; background: var(--border); margin: 1.5rem 0; }
        .sidebar-heading { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px; padding: 0 12px; display: flex; justify-content: space-between; align-items: center;}
        
        .btn-icon { background:transparent; border:none; color:var(--text-dim); cursor:pointer; display:flex; align-items:center; opacity:0.7; transition:all 0.2s; }
        .btn-icon:hover { opacity:1; color: #fff; }

        /* Main Content */
        .main-content {
            flex-grow: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; gap: 1rem; }
        
        .search-wrapper { position:relative; flex-grow: 1; max-width: 500px; }
        .search-wrapper .material-symbols-outlined { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#94a3b8; font-size:18px; }
        .search-wrapper input { width:100%; padding:12px 12px 12px 40px; border:1px solid var(--border); border-radius:12px; background:var(--card-bg); font-size:14px; color:#fff; outline:none; transition:all 0.2s; box-sizing: border-box; }
        .search-wrapper input:focus { border-color:var(--accent); }

        .compare-btn { background-color: var(--accent); color: #fff; border: none; padding: 0.75rem 1.5rem; border-radius: 6px; font-weight: 600; cursor: pointer; display: none; align-items: center; gap: 0.5rem; transition: background 0.2s; }
        .compare-btn:hover { background-color: var(--accent-hover); }

        /* Library Grid */
        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .paper-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: transform 0.2s, border-color 0.2s;
        }
        .paper-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
        .select-checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent); }

        .star-box { display:flex; align-items:center; gap: 8px;}
        .star-toggle { background:transparent; border:none; cursor:pointer; color: var(--text-dim); transition:all 0.2s; padding:0; display:flex;}
        .star-toggle.starred { color: var(--star-color); }
        .star-toggle.starred .material-symbols-outlined { font-variation-settings: 'FILL' 1; }

        .paper-title { font-size: 1.05rem; font-weight: 700; line-height: 1.4; margin-bottom: 0.5rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; color: #fff; }
        .paper-authors { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 1rem; }
        
        .tags-container { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.5rem; flex-grow: 1; align-content: flex-start; }
        .tag-pill { background: var(--tag-bg); color: var(--accent); padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: 600; white-space: nowrap; }

        .card-actions { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 1rem; gap: 0.5rem;}
        
        .btn-chat { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); color: var(--text-main); padding: 0.4rem 0.8rem; border-radius: 6px; font-size: 0.8rem; font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 0.4rem; transition: all 0.2s; }
        .btn-chat:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

        .action-group { display: flex; gap: 4px; }
        .btn-small { background: transparent; border: 1px solid transparent; color: var(--text-dim); padding: 0.4rem; border-radius: 6px; cursor: pointer; display: flex; align-items: center; transition: all 0.2s; }
        .btn-small:hover { background: rgba(255,255,255,0.05); color: #fff; border-color: var(--border); }
        
        select.collection-select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 0.4rem;
            border-radius: 6px;
            font-size: 0.75rem;
            outline: none;
            max-width: 100px;
        }

        .notes-container { display: none; margin-top: 1rem; }
        .notes-container.active { display: block; }
        .notes-textarea {
            width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border);
            color: #fff; border-radius: 6px; padding: 0.75rem; font-size: 0.85rem;
            resize: vertical; min-height: 80px; box-sizing: border-box; outline:none;
        }
        .notes-textarea:focus { border-color: var(--accent); }

        .empty-state { grid-column: 1 / -1; text-align: center; padding: 5rem 0; color: var(--text-dim); }
        .empty-state .material-symbols-outlined { font-size: 4rem; margin-bottom: 1rem; opacity: 0.3; }

        /* Loader */
        .loader-pulse { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: var(--accent); animation: pulse-slow 1.5s infinite; }
        @keyframes pulse-slow {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(79, 142, 247, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(79, 142, 247, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(79, 142, 247, 0); }
        }

    </style>
    <script src="js/toast.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <script>
        const authToken = localStorage.getItem('authToken');
        if (!authToken) { window.location.href = '/login.html'; }
        window.addEventListener('DOMContentLoaded', () => {
          const btn = document.createElement('button');
          btn.textContent = 'Sign Out';
          btn.style.cssText = 'position: fixed; top: 1rem; right: 1rem; background-color: #dc2626; color: white; padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: bold; cursor: pointer; z-index: 1000; border: none;';
          btn.onclick = () => {
            fetch('/api/auth/logout', { method: 'POST' }).finally(() => {
              localStorage.removeItem('authToken');
              window.location.href = '/login.html';
            });
          };
          document.body.appendChild(btn);
        });
    
        const originalFetch = window.fetch;
        window.fetch = async function() {
          let [resource, config] = arguments;
          if (!config) config = {};
          if (!config.headers) config.headers = {};
          const t = localStorage.getItem('authToken');
          if (t) {
            if (config.headers instanceof Headers) {
              config.headers.append('Authorization', 'Bearer ' + t);
            } else {
              config.headers['Authorization'] = 'Bearer ' + t;
            }
          }
          return originalFetch(resource, config);
        };
    </script>

    <header>
        <a href="/" class="logo">Research<span>AI</span></a>
        <nav>
            <a href="upload.html">Upload</a>
            <a href="library.html" style="color: var(--accent)">Library</a>
            <a href="chat.html">Chat</a>
            <a href="compare.html">Compare</a>
        </nav>
    </header>

    <div class="layout-body">
        
        <!-- Left Sidebar Filter -->
        <aside class="sidebar">
            <div id="filter-all" class="nav-item active" onclick="setFilter('all')">
                <span class="material-symbols-outlined">library_books</span> All Papers
            </div>
            <div id="filter-starred" class="nav-item" onclick="setFilter('starred')">
                <span class="material-symbols-outlined">star</span> Starred
            </div>
            
            <div class="sidebar-divider"></div>
            
            <div class="sidebar-heading">
                <span>Collections</span>
                <button class="btn-icon" onclick="createNewCollection()" title="New Collection">
                    <span class="material-symbols-outlined" style="font-size:18px;">add</span>
                </button>
            </div>
            <div id="collectionsList">
                <!-- Collections go here -->
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="action-bar">
                <div class="search-wrapper">
                    <span class="material-symbols-outlined">search</span>
                    <input id="librarySearch" type="text" placeholder="Search papers, authors, or tags...">
                </div>
                
                <div style="display: flex; gap: 1rem;">
                    <button id="askAllBtn" onclick="askAllPapers()" style="display:flex;align-items:center;gap:8px;background:#1e68f1;color:#fff; border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:600; cursor:pointer;transition:all 0.2s;">
                        <span class="material-symbols-outlined" style="font-size:16px">forum</span>
                        Ask All
                    </button>
                    <button id="litReviewBtn" class="compare-btn" style="background-color: var(--success);">
                        <span class="material-symbols-outlined">auto_stories</span> Generating Lit Review
                    </button>
                    <button id="compareSelected" class="compare-btn">
                        <span class="material-symbols-outlined">compare_arrows</span> Compare (<span id="selectedCount">0</span>)
                    </button>
                </div>
            </div>

            <h2 id="viewTitle" style="margin-top:0; margin-bottom:1.5rem; font-size:1.5rem;">All Papers</h2>

            <div class="library-grid" id="libraryGrid">
                <!-- Data populated via JS -->
                 <div style="grid-column: 1/-1; text-align: center; color: var(--text-dim); padding: 50px;">Loading library...</div>
            </div>
        </main>
    </div>

    <!-- Literature Review Modal -->
    <div id="litReviewModal" class="modal-overlay" style="display:none; position:fixed; inset:0; background:rgba(13,17,23,0.85); backdrop-filter:blur(4px); z-index:999; align-items:center; justify-content:center; padding:2rem;">
        <div class="modal-content" style="background:var(--card-bg); border:1px solid var(--border); width:100%; max-width:800px; height:85vh; border-radius:12px; display:flex; flex-direction:column; box-shadow:0 16px 40px rgba(0,0,0,0.5);">
            <div class="modal-header" style="padding:1.5rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
                <h3 style="margin:0; font-size:1.25rem; font-weight:700; display:flex; align-items:center; gap:0.5rem;"><span class="material-symbols-outlined" style="color:var(--accent)">auto_stories</span> Literature Review</h3>
                <button id="closeLitModal" style="background:none; border:none; color:var(--text-dim); cursor:pointer; display:flex; align-items:center; padding:0.25rem; border-radius:4px; transition:all 0.2s;" onmousedown="document.getElementById('litReviewModal').style.display='none'"><span class="material-symbols-outlined">close</span></button>
            </div>
            <div id="litReviewBody" class="custom-scrollbar" style="padding:1.5rem; flex-grow:1; overflow-y:auto; line-height:1.6; color:var(--text-main); font-size:0.95rem;">
                <div id="litReviewSpinner" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; opacity:0.5; padding: 2rem; text-align: center;">
                    <span class="loader-pulse" style="margin-bottom:1rem; width:24px; height:24px;"></span>
                    <p id="litReviewStatusMsg">Synthesizing papers... (May take 30-60s)</p>
                </div>
                <div id="litReviewMarkdown"></div>
            </div>
            <div id="litReviewFooter" style="padding:1rem 1.5rem; border-top:1px solid var(--border); display:none; justify-content:flex-end; gap:1rem;">
                <button id="copyLitBtn" style="background:transparent; border:1px solid var(--border); color:var(--text-main); padding:0.5rem 1rem; border-radius:6px; font-weight:500; cursor:pointer; display:flex; align-items:center; gap:0.5rem;">
                    <span class="material-symbols-outlined">content_copy</span> Copy to Clipboard
                </button>
            </div>
        </div>
    </div>

    <!-- Injecting scripts at the bottom -->
    <script>
        const libraryGrid = document.getElementById('libraryGrid');
        const compareBtn = document.getElementById('compareSelected');
        const litReviewBtn = document.getElementById('litReviewBtn');
        const selectedCountLabel = document.getElementById('selectedCount');
        const searchInput = document.getElementById('librarySearch');
        const collectionsList = document.getElementById('collectionsList');
        const viewTitle = document.getElementById('viewTitle');

        let selectedPapers = new Set();
        let allPapers = [];
        let collections = [];
        let currentFilter = 'all'; // 'all', 'starred', or collectionId
        
        let searchTimeout = null;

        // Fetching Collections
        async function fetchCollections() {
            try {
                const res = await fetch('/api/collections');
                collections = await res.json();
                renderCollectionsSidebar();
            } catch (e) {
                console.error("Failed to fetch collections", e);
            }
        }

        // Fetching Library
        async function fetchLibrary(query = '') {
            try {
                let url = '/api/library/search';
                if (query) url += `?q=${encodeURIComponent(query)}`;
                const res = await fetch(url);
                allPapers = await res.json();
                renderLibrary();
            } catch (e) {
                console.error("Failed to fetch library", e);
            }
        }

        // Render Functions
        function renderCollectionsSidebar() {
            collectionsList.innerHTML = collections.map(c => `
                <div id="filter-col-${c.id}" class="nav-item ${currentFilter === c.id ? 'active' : ''}" onclick="setFilter('${c.id}', '${c.name.replace(/\\/g, '\\\\').replace(/'/g, "\\'")}')">
                    <span class="material-symbols-outlined">folder</span> ${c.name}
                </div>
            `).join('');
        }

        function setFilter(filterId, title = '') {
            currentFilter = filterId;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            
            if (filterId === 'all') {
                document.getElementById('filter-all').classList.add('active');
                viewTitle.textContent = "All Papers";
            } else if (filterId === 'starred') {
                document.getElementById('filter-starred').classList.add('active');
                viewTitle.textContent = "Starred Papers";
            } else {
                const colItem = document.getElementById(`filter-col-${filterId}`);
                if (colItem) colItem.classList.add('active');
                viewTitle.textContent = title;
            }
            renderLibrary();
        }

        function renderLibrary() {
            let displayPapers = allPapers;
            if (currentFilter === 'starred') {
                displayPapers = allPapers.filter(p => p.starred);
            } else if (currentFilter !== 'all') {
                displayPapers = allPapers.filter(p => p.collectionId === currentFilter);
            }

            if (displayPapers.length === 0) {
                libraryGrid.innerHTML = `
                    <div class="empty-state">
                        <span class="material-symbols-outlined">search_off</span>
                        <p>No papers found here.</p>
                    </div>
                `;
                return;
            }

            libraryGrid.innerHTML = displayPapers.map(paper => {
                const authors = (paper.authors || []).length > 3 
                    ? paper.authors.slice(0, 3).join(', ') + ' et al.'
                    : (paper.authors || []).join(', ');

                const isStarred = paper.starred === 1;
                const starIcon = isStarred ? 'starred' : '';

                const tagsHtml = (paper.tags && paper.tags.length > 0)
                    ? paper.tags.map(t => `<span class="tag-pill">${t}</span>`).join('')
                    : `<span class="tag-pill" style="opacity:0.5; background:transparent; border:1px solid var(--border)">No tags</span>`;

                const collectionOptions = collections.map(c => 
                    `<option value="${c.id}" ${paper.collectionId === c.id ? 'selected' : ''}>${c.name}</option>`
                ).join('');

                return `
                    <div class="paper-card" id="card-${paper.paperId}">
                        <div class="card-header">
                            <input type="checkbox" class="select-checkbox" data-id="${paper.paperId}" onchange="toggleSelection(this)" ${selectedPapers.has(paper.paperId) ? 'checked' : ''}>
                            <div class="star-box">
                                <button class="star-toggle ${starIcon}" onclick="toggleStar('${paper.paperId}')" title="Star paper">
                                    <span class="material-symbols-outlined">star</span>
                                </button>
                            </div>
                        </div>
                        <h3 class="paper-title" title="${paper.title}">${paper.title}</h3>
                        <p class="paper-authors">${authors} &bull; ${paper.year || 'N/A'}</p>
                        
                        <div class="tags-container">
                            ${tagsHtml}
                        </div>

                        <div class="card-actions">
                            <a href="chat.html?paperId=${paper.paperId}" class="btn-chat">
                                <span class="material-symbols-outlined" style="font-size:16px;">forum</span> Chat
                            </a>
                            <div class="action-group">
                                <select class="collection-select" onchange="updateCollection('${paper.paperId}', this.value)">
                                    <option value="">Move to...</option>
                                    ${collectionOptions}
                                </select>
                                <button class="btn-small" onclick="sharePaper('${paper.paperId}')" title="Share Paper">
                                    <span class="material-symbols-outlined" style="font-size:18px;">share</span>
                                </button>
                                <button class="btn-small" onclick="toggleNotes('${paper.paperId}')" title="Notes">
                                    <span class="material-symbols-outlined" style="font-size:18px;">edit_note</span>
                                </button>
                                <button class="btn-small" onclick="deletePaper('${paper.paperId}')" title="Delete">
                                    <span class="material-symbols-outlined" style="font-size:18px;">delete</span>
                                </button>
                            </div>
                        </div>

                        <!-- Notes Panel -->
                        <div class="notes-container" id="notes-${paper.paperId}">
                            <textarea class="notes-textarea" placeholder="Add private notes here... auto-saves on blur." 
                                      onblur="saveNotes('${paper.paperId}', this.value)">${paper.userNotes || ''}</textarea>
                        </div>
                    </div>
                `;
            }).join('');
            
            updateCompareButton();
        }

        // Actions
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                fetchLibrary(e.target.value);
            }, 300);
        });

        async function createNewCollection() {
            const name = prompt("Enter new collection name:");
            if (!name || !name.trim()) return;
            try {
                const res = await fetch('/api/collections', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                if (res.ok) fetchCollections();
            } catch (error) {
                console.error(error);
            }
        }

        async function updateCollection(paperId, collectionId) {
            try {
                await fetch(`/api/library/${paperId}/collection`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ collectionId: collectionId || null })
                });
                
                // Locally update state (if we are filtering currently by collection, this might hide it)
                const p = allPapers.find(x => x.paperId === paperId);
                if (p) p.collectionId = collectionId || null;
                
                if (currentFilter !== 'all' && currentFilter !== 'starred') {
                    renderLibrary(); // Re-render to hide removed element
                }
                showToast('Moved paper', 'success');
            } catch (err) {
                showToast('Failed to move', 'error');
            }
        }

        async function toggleStar(paperId) {
            try {
                const res = await fetch(`/api/library/${paperId}/star`, { method: 'PATCH' });
                const data = await res.json();
                
                const p = allPapers.find(x => x.paperId === paperId);
                if (p) p.starred = data.starred;
                
                renderLibrary();
            } catch (e) {
                console.error(e);
                showToast('Failed to star', 'error');
            }
        }

        function toggleNotes(paperId) {
            const el = document.getElementById(`notes-${paperId}`);
            if (el.classList.contains('active')) {
                el.classList.remove('active');
            } else {
                el.classList.add('active');
                el.querySelector('textarea').focus();
            }
        }

        async function saveNotes(paperId, value) {
            try {
                await fetch(`/api/library/${paperId}/notes`, {
                    method: 'PATCH',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ notes: value })
                });
                const p = allPapers.find(x => x.paperId === paperId);
                if (p) p.userNotes = value;
                showToast('Notes saved', 'success');
            } catch (e) {
                showToast('Failed to save notes', 'error');
            }
        }

        async function deletePaper(paperId) {
            if (!confirm('Delete this paper permanently?')) return;
            try {
                const res = await fetch(`/api/library/${paperId}`, { method: 'DELETE' });
                if (res.ok) {
                    allPapers = allPapers.filter(p => p.paperId !== paperId);
                    selectedPapers.delete(paperId);
                    renderLibrary();
                } else {
                    showToast('Failed to delete', 'error');
                }
            } catch(e) {}
        }

        async function sharePaper(paperId) {
            try {
                const res = await fetch(`/api/library/${paperId}/share`, { method: 'POST' });
                const data = await res.json();
                if (data.shareUrl) {
                    await navigator.clipboard.writeText(data.shareUrl);
                    showToast('Share link copied to clipboard!', 'success');
                } else throw new Error();
            } catch(e) {
                showToast('Failed to generate share link', 'error');
            }
        }

        // Selection
        function toggleSelection(checkbox) {
            const paperId = checkbox.dataset.id;
            checkbox.checked ? selectedPapers.add(paperId) : selectedPapers.delete(paperId);
            updateCompareButton();
        }

        function updateCompareButton() {
            const count = selectedPapers.size;
            selectedCountLabel.textContent = count;
            compareBtn.style.display = count >= 2 ? 'flex' : 'none';
            litReviewBtn.style.display = count >= 2 ? 'flex' : 'none';
        }

        compareBtn.addEventListener('click', () => {
            const pIds = Array.from(selectedPapers).join(',');
            window.location.href = `compare.html?paperIds=${pIds}`;
        });

        function askAllPapers() {
            if (allPapers.length === 0) return showToast('No papers!', 'warning');
            const allIds = allPapers.map(c => c.paperId);
            localStorage.setItem('selectedPapers', JSON.stringify(allIds));
            window.location.href = `chat.html`;
        }
        
        // Initial load
        fetchCollections().then(() => fetchLibrary());

        // Lit Review Logic
        const socket = io();
        let rawLitReviewMarkdown = "";
        
        litReviewBtn.addEventListener('click', async () => {
            if (selectedPapers.size < 2) return;
            const litModal = document.getElementById('litReviewModal');
            const litReviewMarkdown = document.getElementById('litReviewMarkdown');
            const litReviewSpinner = document.getElementById('litReviewSpinner');
            const litReviewFooter = document.getElementById('litReviewFooter');

            litModal.style.display = 'flex';
            litReviewSpinner.style.display = 'flex';
            litReviewMarkdown.innerHTML = '';
            litReviewFooter.style.display = 'none';
            rawLitReviewMarkdown = "";

            socket.off('litreview:chunk');
            socket.off('litreview:final');
            socket.off('litreview:error');
            socket.off('litreview:status');

            socket.on('litreview:status', (data) => {
                const statusEl = document.getElementById('litReviewStatusMsg');
                if (statusEl) statusEl.textContent = data.message || 'Generating...';
            });
            socket.on('litreview:chunk', (data) => {
                litReviewSpinner.style.display = 'none';
                rawLitReviewMarkdown += data.chunk;
                litReviewMarkdown.innerHTML = marked.parse(rawLitReviewMarkdown);
            });
            socket.on('litreview:final', () => { litReviewFooter.style.display = 'flex'; });
            socket.on('litreview:error', (data) => {
                litReviewSpinner.style.display = 'none';
                litReviewMarkdown.innerHTML = `<p style="color:var(--danger)">${data.error}</p>`;
            });

            try {
                await fetch('/api/lit-review', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ socketId: socket.id, paperIds: Array.from(selectedPapers) })
                });
            } catch (err) {}
        });

        document.getElementById('copyLitBtn')?.addEventListener('click', async () => {
            if (rawLitReviewMarkdown) {
                await navigator.clipboard.writeText(rawLitReviewMarkdown);
                showToast('Review copied', 'success');
            }
        });
    </script>
</body>
</html>

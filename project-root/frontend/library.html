<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResearchAI - Paper Library</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-dark: #0d1117;
            --card-bg: #161b22;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent: #4f8ef7;
            --accent-hover: #3b7ad9;
            --border: #30363d;
            --danger: #da3633;
            --success: #238636;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .logo span {
            color: var(--accent);
        }

        nav {
            display: flex;
            gap: 1.5rem;
        }

        nav a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover {
            color: var(--accent);
        }

        /* ActionBar */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .compare-btn {
            background-color: var(--accent);
            color: #fff;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            display: none; /* Hidden until 2+ selected */
            align-items: center;
            gap: 0.5rem;
            transition: background 0.2s;
        }

        .compare-btn:hover {
            background-color: var(--accent-hover);
        }

        /* Library Grid */
        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .paper-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: transform 0.2s, border-color 0.2s;
        }

        .paper-card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .select-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--accent);
        }

        .year-badge {
            background: rgba(79, 142, 247, 0.1);
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .status-ready {
            background: rgba(35, 134, 54, 0.1);
            color: var(--success);
        }

        .status-needs-reindex {
            background: rgba(218, 54, 51, 0.1);
            color: #d29922; /* amber-like color */
        }

        .paper-title {
            font-size: 1.1rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 0.75rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            line-clamp: 2;
            overflow: hidden;
            color: #fff;
        }

        .paper-authors {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }

        .card-actions {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 0.75rem;
            margin-top: auto;
        }

        .btn-chat {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.6rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .btn-chat:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .btn-delete {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 0.6rem;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-delete:hover {
            background: var(--danger);
            border-color: var(--danger);
            color: #fff;
        }

        /* Empty state */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 5rem 0;
            color: var(--text-dim);
        }

        .empty-state .material-symbols-outlined {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        /* Generated Review Modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(4px); z-index: 999;
            display: none; align-items: center; justify-content: center;
            padding: 2rem;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: var(--card-bg); border: 1px solid var(--border);
            width: 100%; max-width: 800px; height: 85vh;
            border-radius: 12px; display: flex; flex-direction: column;
            box-shadow: 0 16px 40px rgba(0,0,0,0.5);
        }
        .modal-header {
            padding: 1.5rem; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-header h3 { margin: 0; font-size: 1.25rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem; }
        .btn-close {
            background: none; border: none; color: var(--text-dim);
            cursor: pointer; display: flex; align-items: center; padding: 0.25rem;
            border-radius: 4px; transition: all 0.2s;
        }
        .btn-close:hover { background: rgba(255,255,255,0.1); color: #fff; }
        
        .modal-body {
            padding: 1.5rem; flex-grow: 1; overflow-y: auto;
            line-height: 1.6; color: var(--text-main); font-size: 0.95rem;
        }
        /* Basic Markdown styles for modal */
        .modal-body h2 { color: #fff; margin-top: 2rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
        .modal-body h2:first-child { margin-top: 0; }
        .modal-body p { margin-bottom: 1rem; }
        .modal-body ul { padding-left: 1.5rem; margin-bottom: 1rem; }
        .modal-body li { margin-bottom: 0.5rem; }
        .modal-body strong { color: #fff; }

        .modal-footer {
            padding: 1rem 1.5rem; border-top: 1px solid var(--border);
            display: flex; justify-content: flex-end; gap: 1rem;
            display: none; /* hidden while streaming */
        }
        .btn-secondary {
            background: transparent; border: 1px solid var(--border);
            color: var(--text-main); padding: 0.5rem 1rem; border-radius: 6px;
            font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 0.5rem;
            transition: all 0.2s;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.05); }

        .btn-primary {
            background: var(--accent); border: none;
            color: #fff; padding: 0.5rem 1rem; border-radius: 6px;
            font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 0.5rem;
            transition: all 0.2s;
        }
        .btn-primary:hover { background: var(--accent-hover); }

        .loader-pulse {
            display: inline-block; width: 12px; height: 12px;
            border-radius: 50%; background: var(--accent);
            animation: pulse-slow 1.5s infinite;
        }
        @keyframes pulse-slow {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(79, 142, 247, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(79, 142, 247, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(79, 142, 247, 0); }
        }
    </style>
    <script src="js/toast.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="logo">Research<span>AI</span></a>
            <nav>
                <a href="upload.html">Upload</a>
                <a href="library.html" style="color: var(--accent)">Library</a>
                <a href="chat.html">Chat</a>
                <a href="compare.html">Compare</a>
            </nav>
        </header>

        <div class="action-bar">
            <h2>Paper Library</h2>
            <div style="display: flex; gap: 1rem;">
                <button id="askAllBtn" onclick="askAllPapers()"
                  style="display:flex;align-items:center;gap:8px;background:#1e68f1;color:#fff;
                         border:none;border-radius:20px;padding:8px 18px;font-size:13px;font-weight:600;
                         cursor:pointer;transition:all 0.2s;box-shadow:0 2px 8px rgba(30,104,241,0.3);"
                  onmouseover="this.style.background='#1652c5';this.style.transform='translateY(-1px)'"
                  onmouseout="this.style.background='#1e68f1';this.style.transform='translateY(0)'">
                  <span class="material-symbols-outlined" style="font-size:16px">forum</span>
                  Ask Across All Papers
                </button>
                <button id="litReviewBtn" class="compare-btn" style="background-color: var(--success);" title="Auto-generate a literature review from selected papers (Min 2)">
                    <span class="material-symbols-outlined">auto_stories</span>
                    Generate Lit Review
                </button>
                <button id="compareSelected" class="compare-btn">
                    <span class="material-symbols-outlined">compare_arrows</span>
                    Compare Selected (<span id="selectedCount">0</span>)
                </button>
            </div>
        </div>

        <!-- Search Filter -->
        <div style="position:relative;max-width:400px;margin-bottom:20px;">
          <span class="material-symbols-outlined" 
            style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:18px;">
            search
          </span>
          <input id="librarySearch" type="text" placeholder="Search papers by title or author..."
            style="width:100%;padding:10px 12px 10px 40px;border:1px solid #e2e8f0;border-radius:12px;
                   background:#fcfdfe;font-size:14px;color:#334155;outline:none;transition:all 0.2s;"
            onfocus="this.style.borderColor='#1e68f1';this.style.boxShadow='0 0 0 3px rgba(30,104,241,0.05)'"
            onblur="this.style.borderColor='#e2e8f0';this.style.boxShadow='none'"
            oninput="filterLibrary(this.value)">
        </div>

        <div class="library-grid" id="libraryGrid">
            <!-- Papers will be loaded here -->
            <div class="empty-state">
                <span class="material-symbols-outlined">cloud_upload</span>
                <p>No papers in your library yet. Upload one to get started!</p>
            </div>
        </div>
    </div>

    <!-- Literature Review Modal -->
    <div id="litReviewModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3><span class="material-symbols-outlined text-[var(--accent)]">auto_stories</span> Literature Review</h3>
                <button id="closeLitModal" class="btn-close"><span class="material-symbols-outlined">close</span></button>
            </div>
            <div id="litReviewBody" class="modal-body custom-scrollbar">
                <div id="litReviewSpinner" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; opacity: 0.5;">
                    <span class="loader-pulse" style="margin-bottom: 1rem; width: 24px; height: 24px;"></span>
                    <p>Synthesizing papers... (May take 30-60s)</p>
                </div>
                <div id="litReviewMarkdown"></div>
            </div>
            <div id="litReviewFooter" class="modal-footer">
                <button id="copyLitBtn" class="btn-secondary">
                    <span class="material-symbols-outlined">content_copy</span> Copy to Clipboard
                </button>
                <button id="downloadLitBtn" class="btn-primary">
                    <span class="material-symbols-outlined">download</span> Download Markdown
                </button>
            </div>
        </div>
    </div>

    <script>
        const libraryGrid = document.getElementById('libraryGrid');
        const compareBtn = document.getElementById('compareSelected');
        const selectedCountLabel = document.getElementById('selectedCount');
        let selectedPapers = new Set();

        const socket = io();
        socket.on('connect', () => console.log('[Socket Library] Connected:', socket.id));

        async function fetchLibrary() {
            try {
                const response = await fetch('/api/library');
                const papers = await response.json();
                renderLibrary(papers);
            } catch (error) {
                console.error('Failed to fetch library:', error);
            }
        }

        function renderLibrary(papers) {
            if (papers.length === 0) {
                libraryGrid.innerHTML = `
                    <div class="empty-state">
                        <span class="material-symbols-outlined">cloud_upload</span>
                        <p>No papers in your library yet. <a href="upload.html" style="color:var(--accent)">Upload one</a> to get started!</p>
                    </div>
                `;
                return;
            }

            libraryGrid.innerHTML = papers.map(paper => {
                const authors = (paper.authors || []).length > 3 
                    ? paper.authors.slice(0, 3).join(', ') + ' et al.'
                    : (paper.authors || []).join(', ');

                const statusBadge = paper.status === 'ready' 
                    ? `<span class="status-badge status-ready"><span class="material-symbols-outlined" style="font-size: 14px">check_circle</span> Ready</span>`
                    : `<span class="status-badge status-needs-reindex"><span class="material-symbols-outlined" style="font-size: 14px">warning</span> Re-upload needed</span>`;

                return `
                    <div class="paper-card" id="card-${paper.paperId}">
                        <div class="card-header">
                            <input type="checkbox" class="select-checkbox" data-id="${paper.paperId}" onchange="toggleSelection(this)">
                            <div style="display: flex; gap: 0.5rem; align-items: center;">
                                ${statusBadge}
                                <span class="year-badge">${paper.year || 'N/A'}</span>
                            </div>
                        </div>
                        <h3 class="paper-title">${paper.title}</h3>
                        <p class="paper-authors">${authors}</p>
                        <div class="card-actions">
                            <a href="chat.html?paperId=${paper.paperId}" class="btn-chat">
                                <span class="material-symbols-outlined">chat</span>
                                Read & Chat
                            </a>
                            <div style="display: flex; gap: 0.5rem;">
                                ${paper.hasLocalData ? `
                                <button class="btn-delete" style="color:var(--accent)" onclick="reindexPaper('${paper.paperId}', this)" title="Re-index paper chunks into FAISS">
                                    <span class="material-symbols-outlined">bolt</span>
                                </button>` : ''}
                                <button class="btn-delete" onclick="deletePaper('${paper.paperId}')" title="Delete Paper">
                                    <span class="material-symbols-outlined">delete</span>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleSelection(checkbox) {
            const paperId = checkbox.dataset.id;
            if (checkbox.checked) {
                selectedPapers.add(paperId);
            } else {
                selectedPapers.delete(paperId);
            }
            updateCompareButton();
        }

        function updateCompareButton() {
            const count = selectedPapers.size;
            selectedCountLabel.textContent = count;
            compareBtn.style.display = count >= 2 ? 'flex' : 'none';
            document.getElementById('litReviewBtn').style.display = count >= 2 ? 'flex' : 'none';
        }

        compareBtn.addEventListener('click', () => {
            const paperIds = Array.from(selectedPapers).join(',');
            window.location.href = `compare.html?paperIds=${paperIds}`;
        });

        function filterLibrary(query) {
          const q = query.toLowerCase().trim();
          const cards = document.querySelectorAll('.paper-card');
          let visibleCount = 0;
          
          cards.forEach(card => {
            const title = (card.querySelector('.paper-title')?.textContent || '').toLowerCase();
            const authors = (card.querySelector('.paper-authors')?.textContent || '').toLowerCase();
            const matches = !q || title.includes(q) || authors.includes(q);
            card.style.display = matches ? '' : 'none';
            if (matches) visibleCount++;
          });
          
          // Show "no results" message
          let noResults = document.getElementById('no-results-msg');
          if (!noResults) {
            noResults = document.createElement('div');
            noResults.id = 'no-results-msg';
            noResults.style.cssText = 'text-align:center;color:#94a3b8;padding:40px;grid-column:1/-1;';
            noResults.textContent = 'No papers match your search.';
            document.getElementById('libraryGrid')?.appendChild(noResults);
          }
          noResults.style.display = visibleCount === 0 && q ? 'block' : 'none';
        }

        function askAllPapers() {
          const allCards = document.querySelectorAll('[data-id]');
          if (allCards.length === 0) {
            showToast('No papers in library yet. Upload some papers first!', 'warning');
            return;
          }
          const allIds = Array.from(allCards).map(c => c.dataset.id).filter(Boolean);
          localStorage.setItem('selectedPapers', JSON.stringify(allIds));
          window.location.href = `chat.html`;
        }

        async function reindexPaper(paperId, btn) {
          btn.disabled = true;
          const originalHtml = btn.innerHTML;
          btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:14px;animation:spin 1s linear infinite">progress_activity</span>';
          
          try {
            const res = await fetch(`/api/library/${paperId}/reindex`, { method: 'POST' });
            const data = await res.json();
            if (data.success) {
              showToast(data.message, 'success');
              btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span>';
              btn.style.color = '#22c55e';
              
              // Refresh library to update status badges
              setTimeout(fetchLibrary, 1500);
            } else {
              showToast(data.error, 'error');
              btn.disabled = false;
              btn.innerHTML = originalHtml;
            }
          } catch (e) {
            showToast('Re-index failed', 'error');
            btn.disabled = false;
            btn.innerHTML = originalHtml;
          }
        }

        async function deletePaper(paperId) {
            if (!confirm('Are you sure you want to delete this paper? All data will be lost.')) return;

            try {
                const response = await fetch(`/api/library/${paperId}`, { method: 'DELETE' });
                if (response.ok) {
                    const card = document.getElementById(`card-${paperId}`);
                    card.style.opacity = '0';
                    card.style.transform = 'scale(0.9)';
                    setTimeout(() => {
                        fetchLibrary();
                        selectedPapers.delete(paperId);
                        updateCompareButton();
                    }, 300);
                } else {
                    showToast('Delete failed. Please try again.', 'error');
                }
            } catch (error) {
                console.error('Error deleting paper:', error);
            }
        }

        // ==== Lit Review Generator Logic ====
        const litReviewBtn = document.getElementById('litReviewBtn');
        const litModal = document.getElementById('litReviewModal');
        const closeLitModal = document.getElementById('closeLitModal');
        const litReviewMarkdown = document.getElementById('litReviewMarkdown');
        const litReviewSpinner = document.getElementById('litReviewSpinner');
        const litReviewFooter = document.getElementById('litReviewFooter');
        
        let rawLitReviewMarkdown = "";

        litReviewBtn.addEventListener('click', async () => {
            if (selectedPapers.size < 2) return;
            
            if (!socket.connected) {
                showToast("Connection lost. Reconnecting...", "warning");
                return;
            }

            // Open modal & resetting state
            litModal.classList.add('active');
            litReviewSpinner.style.display = 'flex';
            litReviewMarkdown.innerHTML = '';
            litReviewFooter.style.display = 'none';
            rawLitReviewMarkdown = "";

            // Cleanup previous listeners
            socket.off('litreview:chunk');
            socket.off('litreview:status');
            socket.off('litreview:final');
            socket.off('litreview:error');
            socket.off('litreview:warning');

            // Setup Listeners
            socket.on('litreview:status', (data) => console.log('[LitReview Status]', data.message));
            
            socket.on('litreview:warning', (data) => showToast(data.warning, 'warning', 5000));

            socket.on('litreview:chunk', (data) => {
                litReviewSpinner.style.display = 'none';
                rawLitReviewMarkdown += data.chunk;
                litReviewMarkdown.innerHTML = marked.parse(rawLitReviewMarkdown);
            });

            socket.on('litreview:final', (data) => {
                console.log('[LitReview Final] Done.');
                litReviewFooter.style.display = 'flex';
                socket.off('litreview:chunk');
                socket.off('litreview:final');
            });

            socket.on('litreview:error', (data) => {
                litReviewSpinner.style.display = 'none';
                litReviewMarkdown.innerHTML = `<p style="color:var(--danger)">${data.error || 'Failed to generate review.'}</p>`;
            });

            try {
                const response = await fetch('/api/lit-review', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        socketId: socket.id,
                        paperIds: Array.from(selectedPapers) 
                    })
                });

                if (!response.ok) {
                    const errorJson = await response.json().catch(() => ({}));
                    throw new Error(errorJson.error || `Server error ${response.status}`);
                }
            } catch (error) {
                litReviewSpinner.style.display = 'none';
                litReviewMarkdown.innerHTML = `<p style="color:var(--danger)">${error.message}</p>`;
                console.error("Lit Review Trigger Error:", error);
            }
        });

        closeLitModal.addEventListener('click', () => {
            litModal.classList.remove('active');
        });

        // Copy and Download logic
        document.getElementById('copyLitBtn').addEventListener('click', async () => {
            if (!rawLitReviewMarkdown) return;
            try {
                await navigator.clipboard.writeText(rawLitReviewMarkdown);
                showToast('Literature review copied to clipboard!', 'success');
            } catch (e) {
                showToast('Failed to copy to clipboard', 'error');
            }
        });

        document.getElementById('downloadLitBtn').addEventListener('click', () => {
            if (!rawLitReviewMarkdown) return;
            const blob = new Blob([rawLitReviewMarkdown], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `literature-review-${new Date().toISOString().slice(0,10)}.md`;
            a.click();
            URL.revokeObjectURL(url);
        });

        fetchLibrary();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - ResearchAI</title>
  <link href="dist/output.css" rel="stylesheet"/>
  <style>
    body { background-color: #121212; color: #E0E0E0; font-family: 'Inter', sans-serif; }
    .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div class="glass-panel p-8 rounded-xl w-full max-w-md shadow-2xl relative">
    <!-- Tab Switcher -->
    <div class="flex border-b border-gray-700 mb-6">
      <button id="tab-login" class="flex-1 py-3 text-center text-blue-400 border-b-2 border-blue-400 font-semibold transition-colors" onclick="switchTab('login')">Sign in</button>
      <button id="tab-register" class="flex-1 py-3 text-center text-gray-400 border-b-2 border-transparent font-semibold transition-colors" onclick="switchTab('register')">Create account</button>
    </div>

    <!-- Login Form -->
    <form id="login-form">
      <div class="mb-4">
        <label class="block text-sm text-gray-400 mb-1">Email</label>
        <input type="email" id="login-email" required class="w-full p-3 rounded-lg bg-gray-800 border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 text-white placeholder-gray-500">
      </div>
      <div class="mb-6">
        <label class="block text-sm text-gray-400 mb-1">Password</label>
        <input type="password" id="login-password" required class="w-full p-3 rounded-lg bg-gray-800 border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 text-white placeholder-gray-500">
      </div>
      <button type="submit" id="login-submit" class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-lg transition-colors flex justify-center items-center">
        <span>Sign In</span>
      </button>
      <p id="login-error" class="text-red-400 text-sm mt-3 text-center hidden"></p>
    </form>

    <!-- Register Form -->
    <form id="register-form" class="hidden">
      <div class="mb-4">
        <label class="block text-sm text-gray-400 mb-1">Email</label>
        <input type="email" id="register-email" required class="w-full p-3 rounded-lg bg-gray-800 border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 text-white placeholder-gray-500">
      </div>
      <div class="mb-4">
        <label class="block text-sm text-gray-400 mb-1">Password</label>
        <input type="password" id="register-password" required class="w-full p-3 rounded-lg bg-gray-800 border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 text-white placeholder-gray-500">
      </div>
      <div class="mb-6">
        <label class="block text-sm text-gray-400 mb-1">Confirm Password</label>
        <input type="password" id="register-confirm" required class="w-full p-3 rounded-lg bg-gray-800 border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 text-white placeholder-gray-500">
      </div>
      <button type="submit" id="register-submit" class="w-full py-3 bg-green-600 hover:bg-green-500 text-white font-bold rounded-lg transition-colors flex justify-center items-center">
        <span>Create Account</span>
      </button>
      <p id="register-error" class="text-red-400 text-sm mt-3 text-center hidden"></p>
    </form>
  </div>

  <script>
    // If they already have a token, just redirect
    if (localStorage.getItem('authToken')) {
      window.location.href = '/upload.html';
    }

    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('login-form').classList.toggle('hidden', !isLogin);
      document.getElementById('register-form').classList.toggle('hidden', isLogin);
      
      document.getElementById('tab-login').className = isLogin 
        ? "flex-1 py-3 text-center text-blue-400 border-b-2 border-blue-400 font-semibold transition-colors"
        : "flex-1 py-3 text-center text-gray-400 border-b-2 border-transparent font-semibold transition-colors";
        
      document.getElementById('tab-register').className = !isLogin 
        ? "flex-1 py-3 text-center text-blue-400 border-b-2 border-blue-400 font-semibold transition-colors"
        : "flex-1 py-3 text-center text-gray-400 border-b-2 border-transparent font-semibold transition-colors";
        
      document.getElementById('login-error').classList.add('hidden');
      document.getElementById('register-error').classList.add('hidden');
    }

    async function handleAuth(url, body, button, errorElem) {
      button.disabled = true;
      button.innerHTML = '<svg class="animate-spin h-5 w-5 mr-3 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Please wait...';
      errorElem.classList.add('hidden');

      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        
        if (!res.ok) throw new Error(data.error || 'Authentication failed');

        localStorage.setItem('authToken', data.token);
        window.location.href = '/upload.html';
      } catch (err) {
        button.disabled = false;
        button.innerHTML = button.id === 'login-submit' ? 'Sign In' : 'Create Account';
        errorElem.textContent = err.message;
        errorElem.classList.remove('hidden');
      }
    }

    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      handleAuth('/api/auth/login', {
        email: document.getElementById('login-email').value,
        password: document.getElementById('login-password').value
      }, document.getElementById('login-submit'), document.getElementById('login-error'));
    });

    document.getElementById('register-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const pw = document.getElementById('register-password').value;
      const pwConf = document.getElementById('register-confirm').value;
      const err = document.getElementById('register-error');
      
      if (pw !== pwConf) {
        err.textContent = "Passwords do not match.";
        err.classList.remove('hidden');
        return;
      }
      
      handleAuth('/api/auth/register', {
        email: document.getElementById('register-email').value,
        password: pw
      }, document.getElementById('register-submit'), err);
    });
  </script>
</body>
</html>

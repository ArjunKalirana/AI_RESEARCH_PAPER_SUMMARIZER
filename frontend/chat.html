<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AI Research Chat Interface</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,FILL@0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1e68f1",
                        "background-light": "#ffffff",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 h-screen flex flex-col">
<header class="flex h-16 w-full items-center justify-between border-b border-slate-100 bg-white px-4 sm:px-8 dark:border-slate-800 dark:bg-slate-900 z-50 sticky top-0">
    <div class="flex items-center gap-4 sm:gap-8 h-full">
        <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='upload.html'">
            <div class="bg-primary p-1 rounded-lg">
                <span class="material-symbols-outlined text-white text-lg">school</span>
            </div>
            <span class="hidden xs:block font-bold text-sm tracking-tight">ResAI</span>
        </div>
        <nav class="flex h-full items-center gap-4 sm:gap-8">
            <a class="flex h-full items-center text-xs sm:text-sm font-medium text-slate-400 hover:text-slate-600 border-b-2 border-transparent transition-colors" href="upload.html">Upload</a>
            <a class="flex h-full items-center text-xs sm:text-sm font-medium text-slate-400 hover:text-slate-600 border-b-2 border-transparent transition-colors" href="summary.html">Summary</a>
            <a class="flex h-full items-center text-xs sm:text-sm font-semibold text-primary border-b-2 border-primary" href="#">Chat</a>
        </nav>
    </div>
    <div class="flex items-center gap-3">
        <div class="hidden sm:flex items-center gap-2 text-[10px] font-bold text-slate-400 bg-slate-50 px-3 py-1 rounded-full dark:bg-slate-800">
            <span class="material-symbols-outlined text-sm">description</span>
            <span class="max-w-[100px] truncate">Current Paper</span>
        </div>
        <div class="h-8 w-8 rounded-full bg-primary/10 flex items-center justify-center border border-primary/20">
            <span class="material-symbols-outlined text-primary text-xl">account_circle</span>
        </div>
    </div>
</header>

<main class="relative flex flex-1 flex-col overflow-hidden">
    <div class="flex-1 overflow-y-auto custom-scrollbar pt-6 sm:pt-10 pb-40">
        <div id="chatContainer" class="mx-auto max-w-3xl px-4 sm:px-6 space-y-8 sm:space-y-10">
            <!-- Dynamic Chat Messages -->
            <div class="space-y-3">
                <div class="flex items-center gap-3">
                    <span class="text-[10px] font-extrabold uppercase tracking-widest text-primary">System Assistant</span>
                </div>
                <div class="text-sm sm:text-base leading-relaxed text-slate-700 dark:text-slate-300 bg-slate-50 dark:bg-slate-900/50 p-4 rounded-2xl border border-slate-100 dark:border-slate-800">
                    Hello! I've fully indexed the uploaded paper. You can ask me about the methodology, key findings, or specific data points. How can I help you today?
                </div>
            </div>
        </div>
    </div>
    
    <!-- Input Section -->
    <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-white via-white to-transparent pb-6 sm:pb-8 pt-10 dark:from-background-dark dark:via-background-dark">
        <div class="mx-auto max-w-3xl px-4 sm:px-6">
            <!-- Suggestions -->
            <div class="flex items-center gap-2 overflow-x-auto no-scrollbar mb-4 pb-1">
                <button class="flex-none whitespace-nowrap rounded-full bg-white border border-slate-200 px-4 py-1.5 text-[11px] font-bold text-slate-600 hover:border-primary hover:text-primary transition-all dark:bg-slate-900 dark:border-slate-800">
                    Key Contributions
                </button>
                <button class="flex-none whitespace-nowrap rounded-full bg-white border border-slate-200 px-4 py-1.5 text-[11px] font-bold text-slate-600 hover:border-primary hover:text-primary transition-all dark:bg-slate-900 dark:border-slate-800">
                    Methodology Review
                </button>
                <button class="flex-none whitespace-nowrap rounded-full bg-white border border-slate-200 px-4 py-1.5 text-[11px] font-bold text-slate-600 hover:border-primary hover:text-primary transition-all dark:bg-slate-900 dark:border-slate-800">
                    Main Findings
                </button>
            </div>
            
            <div class="relative flex items-center transition-all focus-within:shadow-md focus-within:border-primary/50 group rounded-2xl bg-white px-2 py-1.5 border-2 border-slate-100 shadow-sm dark:bg-slate-900 dark:border-slate-800">
                <input id="chatInput" class="w-full border-none bg-transparent px-3 sm:px-4 py-2 text-sm focus:outline-none focus:ring-0 placeholder:text-slate-400 dark:text-white" placeholder="Ask a question about the paper..." type="text"/>
                <button id="sendBtn" class="flex h-10 w-10 sm:h-11 sm:w-11 items-center justify-center rounded-xl bg-primary text-white transition-all hover:shadow-lg active:scale-95">
                    <span class="material-symbols-outlined text-xl">send</span>
                </button>
            </div>
            <p class="mt-3 text-center text-[10px] font-bold text-slate-400 uppercase tracking-widest">Research Engine Enabled</p>
        </div>
    </div>
</main>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const paperId = urlParams.get('paperId');

        if (!paperId) {
            alert('No paperId found in URL.');
            return;
        }

        const chatContainer = document.getElementById('chatContainer');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const suggestionBtns = document.querySelectorAll('.whitespace-nowrap.rounded-full');

        suggestionBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                chatInput.value = btn.innerText;
                handleSend();
            });
        });

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

        sendBtn.addEventListener('click', handleSend);

        async function handleSend() {
            const question = chatInput.value.trim();
            if (!question) return;

            // 1. Append User Message
            appendUserMessage(question);
            chatInput.value = '';
            
            // 2. Append Loading Assistant Message
            const loadingId = 'loading-' + Date.now();
            appendAssistantMessage("Thinking...", null, loadingId);
            
            // Scroll to bottom
            const container = document.querySelector('.custom-scrollbar');
            container.scrollTop = container.scrollHeight;

            try {
                // 3. Make API Call (Streaming)
                const response = await fetch('/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ paperId, question })
                });

                if (!response.ok) {
                    const loadingEl = document.getElementById(loadingId);
                    if (loadingEl) loadingEl.remove();
                    appendAssistantMessage("Server returned an error.");
                    return;
                }

                // 4. Setup Streaming Reader
                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let isFirstChunk = true;
                
                // Get the text container where we will append words
                let messageContainer = null;
                const loadingEl = document.getElementById(loadingId);

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunkStr = decoder.decode(value, { stream: true });
                    const events = chunkStr.split('\n\n');

                    for (const event of events) {
                        if (!event.startsWith('data: ')) continue;
                        
                        try {
                            const dataStr = event.substring(6);
                            if (!dataStr) continue;
                            const data = JSON.parse(dataStr);

                            if (data.error) {
                                if (isFirstChunk && loadingEl) loadingEl.remove();
                                appendAssistantMessage(data.error);
                                break;
                            }

                            if (data.chunk) {
                                if (isFirstChunk) {
                                  // Replace "Thinking..." with actual text setup
                                  if (loadingEl) {
                                    const textDiv = loadingEl.querySelector('.text-base');
                                    if (textDiv) {
                                      textDiv.innerHTML = renderMarkdown(data.chunk);
                                      messageContainer = textDiv;
                                    }
                                  }
                                  isFirstChunk = false;
                                } else if (messageContainer) {
                                  // Append new chunk — rerender the whole accumulated text cleanly
                                  messageContainer._raw = (messageContainer._raw || '') + data.chunk;
                                  messageContainer.innerHTML = renderMarkdown(messageContainer._raw);
                                }
                                container.scrollTop = container.scrollHeight;
                            }

                            if (data.final) {
                                // Final Metadata arrived (Confidence & Sources)
                                // We inject the badge HTML directly into the existing message block header
                                if (loadingEl) {
                                    loadingEl.removeAttribute('id'); // It's no longer loading
                                    const headerDiv = loadingEl.querySelector('.flex.items-center.gap-3');
                                    let badgeHtml = getBadgeHtml(data);
                                    if (headerDiv && badgeHtml) {
                                        headerDiv.innerHTML += badgeHtml;
                                    }
                                    
                                    let sourceHtml = getSourceHtml(data);
                                    if (messageContainer && sourceHtml) {
                                        messageContainer.insertAdjacentHTML('afterend', sourceHtml);
                                    }
                                }
                            }

                        } catch (err) {
                            console.error("Stream parsing error:", err, dataStr);
                        }
                    }
                }

            } catch (err) {
                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) loadingEl.remove();
                appendAssistantMessage("Failed to connect to the server.");
            }
            
            container.scrollTop = container.scrollHeight;
        }

        function appendUserMessage(text) {
            const html = `
                <div class="flex flex-col items-end space-y-2">
                    <div class="inline-block rounded-2xl bg-slate-100 px-5 py-3 text-slate-800 dark:bg-slate-800 dark:text-slate-200 text-sm">
                        ${text}
                    </div>
                </div>
            `;
            chatContainer.insertAdjacentHTML('beforeend', html);
        }

        function appendAssistantMessage(text, badgeHtml = '', id = '') {
            const html = `
                <div class="space-y-4" ${id ? `id="${id}"` : ''}>
                    <div class="flex items-center gap-3">
                        <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400">Assistant</span>
                        ${badgeHtml}
                    </div>
                    <div class="text-base leading-relaxed text-slate-700 dark:text-slate-300">
                        ${text}
                    </div>
                </div>
            `;
            chatContainer.insertAdjacentHTML('beforeend', html);
        }

        function getBadgeHtml(data) {
            if (!data.confidenceLabel) return '';
            let badgeClass = '';
            if (data.confidenceLabel === 'High') {
                badgeClass = 'bg-green-50 text-green-700 ring-green-600/20 dark:bg-green-900/20 dark:text-green-400';
            } else if (data.confidenceLabel === 'Medium') {
                badgeClass = 'bg-yellow-50 text-yellow-700 ring-yellow-600/20 dark:bg-yellow-900/20 dark:text-yellow-400';
            } else {
                badgeClass = 'bg-red-50 text-red-700 ring-red-600/20 dark:bg-red-900/20 dark:text-red-400';
            }
            const pct = Math.round((data.confidenceScore || 0) * 100);
            return `
                <div class="flex items-center gap-1.5 rounded-full px-3 py-1 text-[11px] font-bold ring-1 ring-inset ${badgeClass}">
                    <span class="material-symbols-outlined text-[14px]">verified</span>
                    Confidence: ${pct}% &bull; ${data.confidenceLabel}
                </div>
            `;
        }

        function getSourceHtml(data) {
            if (!data.sources || data.sources.length === 0) return '';
            // Show only the first source section name as a clean pill
            const firstSource = data.sources[0];
            return `
                <div class="flex flex-wrap items-center gap-2 pt-2 mt-3 border-t border-slate-100 dark:border-slate-800">
                    <span class="text-[11px] font-semibold text-slate-400 uppercase">Source:</span>
                    <span class="flex items-center gap-1 text-[11px] font-semibold text-primary uppercase tracking-wider">
                        <span class="material-symbols-outlined text-sm">menu_book</span>
                        ${firstSource}
                    </span>
                </div>
            `;
        }

        // Minimal markdown renderer: bold + newlines only
        function renderMarkdown(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        }
    });
</script>
</body></html>

# nixpacks.toml for ResearchAI — Railway deployment

[phases.setup]
nixPkgs = ["python3", "nodejs_20", "gcc", "libpq"]

[phases.install]
cmds = [
  "cd project-root && npm install --include=dev",
  "pip install -r faiss-service/requirements.txt"
]

[phases.build]
cmds = [
  "cd project-root && npm run build"
]

[start]
cmd = "node project-root/app.js"

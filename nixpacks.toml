# nixpacks.toml for ResearchAI Monorepo

[phases.setup]
nixPkgs = ["python3", "nodejs", "gcc", "libpq"]

[phases.install]
cmds = [
  "npm install --prefix project-root",
  "pip install -r faiss-service/requirements.txt"
]

[phases.build]
cmds = [
  "npm run build --prefix project-root"
]

# This configuration supports Railway's "Root Directory" setting.
# If you deploy with Root Directory = "project-root", it will use this if present.
# But it's better to use variables for the start command.

[start]
# Default start command assumes Backend service.
# For FAISS service, override this in Railway with: python faiss-service/main.py
cmd = "node project-root/app.js"
